---
- name: Create application directory
  file:
    path: /opt/springboot-app
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Create dummy JAR file
  copy:
    content: "This simulates a Spring Boot JAR"
    dest: /opt/springboot-app/app.jar
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Deploy systemd service
  template:
    src: springboot.service.j2
    dest: /etc/systemd/system/springboot.service
  notify: reload systemd

- name: Enable springboot service
  service:
    name: springboot
    enabled: yes

- name: Start springboot service
  service:
    name: springboot
    state: started
  ignore_errors: yes
