services:

  postgres-db:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - airbnb-network

  airbnb-app:
    image: jessemukesh/airbnb-app:v1

    container_name: airbnb-container

    depends_on:
      - postgres-db

    ports:
      - "8081:8080"

    networks:
      - airbnb-network

networks:
  airbnb-network:

volumes:
  postgres-data:
