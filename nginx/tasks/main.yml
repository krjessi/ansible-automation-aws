---
- name: Update package cache
  apt:
    update_cache: yes

- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start nginx
  service:
    name: nginx
    state: started

- name: Enable nginx
  service:
    name: nginx
    enabled: yes

- name: Deploy custom homepage
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    notify: restart nginx
